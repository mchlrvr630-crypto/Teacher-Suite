<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v11.0 | Creative Worksheet Suite</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); overflow: hidden; }
        .header { padding: 30px; text-align: center; background: #fff; }
        .content { padding: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #555; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
        .full { grid-column: span 2; }
        button { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #003366; transform: translateY(-1px); }
        .download-btn { background: var(--success); margin-top: 15px; display: none; }
        #output-area { margin-top: 30px; padding: 25px; background: #fafafa; border: 1px dashed #ccc; border-radius: 10px; display: none; }
        .loading { text-align: center; display: none; padding: 20px; color: var(--primary); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Worksheet Creator</h1>
        <p>Creative Activity & Remediation Planning</p>
    </div>

    <div class="content">
        <div class="grid">
            <div class="input-box"><label>Subject</label><input type="text" id="subject" placeholder="e.g. Science"></div>
            <div class="input-box"><label>Grade Level</label><input type="text" id="grade" placeholder="e.g. Grade 7"></div>
            <div class="input-box">
                <label>Type</label>
                <select id="wsType" onchange="toggleRemedial()">
                    <option value="Regular">Regular Activity</option>
                    <option value="Remedial">Remedial Activity</option>
                </select>
            </div>
            <div class="input-box"><label>Total Students</label><input type="number" id="totalStudents"></div>
            <div id="remedialBox" class="input-box hidden"><label>Students needing Remedial (<80%)</label><input type="number" id="failCount"></div>
        </div>
        <div class="input-box full" style="margin-bottom:20px;">
            <label>Learning Competencies (MELCs)</label>
            <textarea id="melcs" rows="3" placeholder="Paste objectives here..."></textarea>
        </div>
        
        <button onclick="generateWorksheet()">✨ Create Creative Worksheet</button>
        
        <div id="loading" class="loading">🎨 Designing Graphics & Tables...</div>

        <div id="output-area">
            <div id="ai-response"></div>
            <button id="downloadBtn" class="download-btn" onclick="exportToWord()">📥 Download Word Doc (.docx)</button>
        </div>
    </div>
</div>

<script>
    let rawAIContent = "";

    function toggleRemedial() {
        const type = document.getElementById('wsType').value;
        document.getElementById('remedialBox').classList.toggle('hidden', type !== 'Remedial');
    }

    async function generateWorksheet() {
        let apiKey = localStorage.getItem("gamai_key");
        if (!apiKey) {
            apiKey = prompt("Enter Gemini API Key:");
            if (apiKey) localStorage.setItem("gamai_key", apiKey);
            else return;
        }

        document.getElementById('loading').style.display = "block";
        document.getElementById('output-area').style.display = "none";

        const type = document.getElementById('wsType').value;
        const failCount = document.getElementById('failCount').value;
        
        const promptText = `Act as a Creative Instructional Designer. Create a ${type} Worksheet for Grade ${document.getElementById('grade').value} ${document.getElementById('subject').value}.
        Competency: ${document.getElementById('melcs').value}.
        ${type === "Remedial" ? "Focus on scaffolding for " + failCount + " students who struggled." : ""}
        
        REQUIRED ELEMENTS:
        1. Visual Header (Text-based graphic description).
        2. "Concept Map" section (Use a text-based table structure).
        3. A "Matching Type" or "Data Table" activity using a Markdown Table.
        4. Creative illustrations descriptions (e.g. [Insert Image of...]).
        5. Analysis Questions.
        6. Answer Key at the bottom.
        
        BE CREATIVE AND ENGAGING. Use fun headings.`;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });
            const data = await response.json();
            rawAIContent = data.candidates[0].content.parts[0].text;
            
            document.getElementById('ai-response').innerHTML = rawAIContent
                .replace(/\n/g, "<br>")
                .replace(/\|/g, " | ")
                .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            
            document.getElementById('output-area').style.display = "block";
            document.getElementById('downloadBtn').style.display = "block";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            document.getElementById('loading').style.display = "none";
        }
    }

    function exportToWord() {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType } = docx;
        
        const lines = rawAIContent.split('\n');
        const docSections = [];

        lines.forEach(line => {
            // Simple logic to detect "Table" lines from AI and convert to Word Tables
            if (line.includes('|')) {
                const cells = line.split('|').filter(c => c.trim() !== "");
                if (cells.length > 1) {
                    docSections.push(new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [new TableRow({
                            children: cells.map(c => new TableCell({ children: [new Paragraph(c.trim())] }))
                        })]
                    }));
                }
            } else {
                docSections.push(new Paragraph({
                    spacing: { before: 200 },
                    children: [new TextRun({ text: line.replace(/\*/g, ""), bold: line.includes('###') })]
                }));
            }
        });

        const doc = new Document({ sections: [{ children: docSections }] });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `${document.getElementById('subject').value}_Worksheet.docx`);
        });
    }
</script>
</body>
</html>
