<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamAI v13.0 | Pedagogy Suite</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #004a99; --accent: #fdb813; --bg: #f0f2f5; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .content { padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #555; }
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
        .full { grid-column: 1 / -1; }
        button { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #003366; }
        .download-btn { background: var(--success); margin-top: 15px; display: none; }
        #output-area { margin-top: 30px; padding: 25px; background: #fafafa; border: 1px dashed #ccc; border-radius: 10px; display: none; }
        .loading { text-align: center; display: none; padding: 20px; color: var(--primary); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamAI Pedagogy Suite</h1>
        <p>Strategic Lesson & Assessment Architect (v13.0)</p>
    </div>

    <div class="content">
        <div class="grid">
            <div class="input-box"><label>Subject</label><input type="text" id="subject"></div>
            <div class="input-box"><label>Grade Level</label><input type="text" id="grade"></div>
            
            <div class="input-box">
                <label>Tool Mode</label>
                <select id="mode" onchange="updateUI()">
                    <option value="Activity">Creative Activity</option>
                    <option value="Test">Formal Test/Quiz</option>
                </select>
            </div>

            <div id="complexityBox" class="input-box hidden">
                <label>Complexity Level</label>
                <select id="complexity">
                    <option value="Easy">Easy (Recall/Understand)</option>
                    <option value="Average">Average (Apply/Analyze)</option>
                    <option value="Difficult">Difficult (Evaluate/Create)</option>
                </select>
            </div>

            <div class="input-box">
                <label>Audience</label>
                <select id="wsType" onchange="toggleRemedial()">
                    <option value="Regular">Regular</option>
                    <option value="Remedial">Remedial</option>
                </select>
            </div>

            <div class="input-box"><label>Item Count</label><input type="number" id="itemCount" value="10"></div>
            <div id="remedialBox" class="input-box hidden"><label>Remedial Count</label><input type="number" id="failCount"></div>
        </div>

        <div class="input-box full" style="margin-bottom:20px;">
            <label>Learning Competencies (MELCs)</label>
            <textarea id="melcs" rows="3" placeholder="Paste lesson objectives here..."></textarea>
        </div>
        
        <button onclick="generateWorksheet()">⚡ Build Educational Resource</button>
        
        <div id="loading" class="loading">🧠 Architecting Pedagogical Content...</div>

        <div id="output-area">
            <div id="ai-response"></div>
            <button id="downloadBtn" class="download-btn" onclick="exportToWord()">📥 Export to Microsoft Word (.docx)</button>
        </div>
    </div>
</div>

<script>
    let rawAIContent = "";

    function updateUI() {
        const mode = document.getElementById('mode').value;
        document.getElementById('complexityBox').classList.toggle('hidden', mode !== 'Test');
    }

    function toggleRemedial() {
        const type = document.getElementById('wsType').value;
        document.getElementById('remedialBox').classList.toggle('hidden', type !== 'Remedial');
    }

    async function generateWorksheet() {
        let apiKey = localStorage.getItem("gamai_key");
        if (!apiKey) {
            apiKey = prompt("Enter Gemini API Key:");
            if (apiKey) localStorage.setItem("gamai_key", apiKey); else return;
        }

        document.getElementById('loading').style.display = "block";
        document.getElementById('output-area').style.display = "none";

        const mode = document.getElementById('mode').value;
        const complexity = document.getElementById('complexity').value;
        const type = document.getElementById('wsType').value;
        const count = document.getElementById('itemCount').value;
        
        let customInstruction = "";
        if (mode === "Activity") {
            customInstruction = `Focus on discovery-based learning. Structure: 1. Fun Activity Title. 2. "Did You Know?" Concept Note. 3. Guided Exploration (Table-based). 4. A hands-on Performance Task. 5. Reflection Question.`;
        } else {
            customInstruction = `Focus on formal assessment. Difficulty Level: ${complexity}. Structure: 1. Examination Header. 2. General Directions. 3. ${count} Formal Test Items (Multiple Choice/Identification). Ensure the items strictly match the ${complexity} cognitive level.`;
        }

        const promptText = `Act as an expert Instructional Designer. 
        Create a ${type} ${mode} for Grade ${document.getElementById('grade').value} ${document.getElementById('subject').value}.
        Competency: ${document.getElementById('melcs').value}.
        ${customInstruction}
        Include placeholders like [INSERT: Description] for visual aids.
        Provide a detailed Answer Key at the end. Use professional academic language.`;

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });
            const data = await response.json();
            rawAIContent = data.candidates[0].content.parts[0].text;
            
            document.getElementById('ai-response').innerHTML = rawAIContent.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            document.getElementById('output-area').style.display = "block";
            document.getElementById('downloadBtn').style.display = "block";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            document.getElementById('loading').style.display = "none";
        }
    }

    function exportToWord() {
        const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle } = docx;
        const lines = rawAIContent.split('\n');
        const children = [];

        lines.forEach(line => {
            if (line.includes('|')) {
                const cells = line.split('|').filter(c => c.trim() !== "");
                if (cells.length > 1) {
                    children.push(new Table({
                        width: { size: 100, type: WidthType.PERCENTAGE },
                        rows: [new TableRow({ children: cells.map(c => new TableCell({ children: [new Paragraph(c.trim())] })) })]
                    }));
                }
            } else {
                const isHeading = line.includes('###') || line.includes('1.') || line.includes('TITLE');
                children.push(new Paragraph({
                    spacing: { before: 120, after: 120 },
                    children: [new TextRun({ text: line.replace(/###/g, "").replace(/\*/g, ""), bold: isHeading, size: isHeading ? 26 : 22 })]
                }));
            }
        });

        const doc = new Document({ sections: [{ children }] });
        Packer.toBlob(doc).then(blob => { saveAs(blob, `${document.getElementById('mode').value}_Worksheet.docx`); });
    }
</script>
</body>
</html>
